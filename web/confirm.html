
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入力内容の確認</title>
  <!-- Scss -->
  <link rel="stylesheet" href="css/my-style.css">
</head>

<body>
  <main class="confirm">
    <div class="confirm__inner">
      <h1 class="confirm__title">お問い合わせ内容の確認</h1>
      <p class="confirm__lead">
        入力内容をご確認のうえ、送信してください。
      </p>

      <div class="confirm__box">
        <dl class="confirm__list">
          <div class="confirm__item">
            <dt>お名前</dt>
            <dd id="confirm-name"></dd>
          </div>

          <div class="confirm__item">
            <dt>メールアドレス</dt>
            <dd id="confirm-email"></dd>
          </div>

          <div class="confirm__item">
            <dt>お問い合わせ種別</dt>
            <dd id="confirm-category"></dd>
          </div>

          <div class="confirm__item">
            <dt>お問い合わせ内容</dt>
            <dd id="confirm-message"></dd>
          </div>
        </dl>

        <p id="confirm-note" class="confirm__note">※本サイトはポートフォリオのため、実際のメール送信は行われません。</p>

        <div class="confirm__buttons">
          <button id="return-to-form-button" class="confirm__button confirm__button--back rounded-pill btn"
            type="button">入力画面に戻って修正する</button>
          <button id="submit-button" class="confirm__button confirm__button--submit rounded-pill btn" type="button"
            aria-describedby="confirm-note">送信する（デモ）</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/confirm.js"></script>
</body>

</html>
