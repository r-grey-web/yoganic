<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>お問い合わせ内容の確認 | Yoganic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="お問い合わせ内容をご確認ください。">
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <!-- OGP -->
  <meta property="og:title" content="お問い合わせ内容の確認 | Yoganic">
  <meta property="og:description" content="お問い合わせ内容をご確認ください。">
  <meta property="og:url" content="https://yoganic-online-yoga.netlify.app/confirm.html">
  <meta property="og:image" content="https://yoganic-online-yoga.netlify.app/img/ogp.jpg">
  <meta property="og:site_name" content="Yoganic">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://yoganic-online-yoga.netlify.app/img/ogp.jpg">
  <!-- Canonical -->
  <link rel="canonical" href="https://yoganic-online-yoga.netlify.app/confirm.html">
  <!-- Robots -->
  <meta name="robots" content="noindex">
  <!-- Scss -->
  <link rel="stylesheet" href="css/my-style.css">
</head>

<body>
  <main class="confirm">
    <div class="confirm__inner">
      <h1 class="confirm__title">お問い合わせ内容の確認</h1>
      <p class="confirm__lead">
        入力内容をご確認のうえ、送信してください。
      </p>

      <div class="confirm__box">
        <dl class="confirm__list">
          <div class="confirm__item">
            <dt>お名前</dt>
            <dd id="confirm-name"></dd>
          </div>

          <div class="confirm__item">
            <dt>メールアドレス</dt>
            <dd id="confirm-email"></dd>
          </div>

          <div class="confirm__item">
            <dt>お問い合わせ種別</dt>
            <dd id="confirm-category"></dd>
          </div>

          <div class="confirm__item">
            <dt>お問い合わせ内容</dt>
            <dd id="confirm-message"></dd>
          </div>
        </dl>

        <p id="confirm-note" class="confirm__note">※本サイトはポートフォリオのため、実際のメール送信は行われません。</p>

        <div class="confirm__buttons">
          <button id="return-to-form-button" class="confirm__button confirm__button--back rounded-pill btn"
            type="button">入力画面に戻って修正する</button>
          <button id="submit-button" class="confirm__button confirm__button--submit rounded-pill btn" type="button"
            aria-describedby="confirm-note">送信する（デモ）</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/confirm.js"></script>
</body>

</html>
